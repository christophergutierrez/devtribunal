name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../devtribunal-${{ matrix.target }}.tar.gz devtribunal
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devtribunal-${{ matrix.target }}
          path: devtribunal-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 checksums
        run: |
          echo "## SHA256 Checksums" > artifacts/checksums.txt
          echo "" >> artifacts/checksums.txt
          cd artifacts
          for f in *.tar.gz; do
            sha256sum "$f" >> checksums.txt
          done
          cat checksums.txt

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_LINUX_X86=$(sha256sum artifacts/devtribunal-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM=$(sha256sum artifacts/devtribunal-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA_MACOS_X86=$(sha256sum artifacts/devtribunal-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_MACOS_ARM=$(sha256sum artifacts/devtribunal-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)

          cat > artifacts/devtribunal.rb << FORMULA
          class Devtribunal < Formula
            desc "MCP server where each tool is a specialist code review agent"
            homepage "https://github.com/christophergutierrez/devtribunal"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/christophergutierrez/devtribunal/releases/download/v${VERSION}/devtribunal-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              elsif Hardware::CPU.intel?
                url "https://github.com/christophergutierrez/devtribunal/releases/download/v${VERSION}/devtribunal-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/christophergutierrez/devtribunal/releases/download/v${VERSION}/devtribunal-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              elsif Hardware::CPU.intel?
                url "https://github.com/christophergutierrez/devtribunal/releases/download/v${VERSION}/devtribunal-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "devtribunal"
            end

            test do
              system bin/"devtribunal", "--version"
            end
          end
          FORMULA

          echo "Generated formula with real SHA256 checksums:"
          cat artifacts/devtribunal.rb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
            artifacts/devtribunal.rb

      - name: Update in-repo Homebrew formula
        run: |
          cp artifacts/devtribunal.rb Formula/devtribunal.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/devtribunal.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged, skipping commit"
          else
            git commit -m "chore: update Homebrew formula for ${GITHUB_REF_NAME} [skip ci]"
            git push origin HEAD:master
          fi

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tmpdir=$(mktemp -d)
          git clone "https://x-access-token:${GH_TOKEN}@github.com/christophergutierrez/homebrew-devtribunal.git" "$tmpdir"
          mkdir -p "$tmpdir/Formula"
          cp artifacts/devtribunal.rb "$tmpdir/Formula/devtribunal.rb"
          cd "$tmpdir"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/devtribunal.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged, skipping commit"
          else
            git commit -m "Update devtribunal to ${GITHUB_REF_NAME}"
            git push
          fi
          rm -rf "$tmpdir"
